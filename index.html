html,body{height:100%;overflow:hidden}
body{font-family:Georgia,serif;background:var(--bg);color:var(--tx);transition:background .3s,color .3s}

/* ── NAVIGATION ── */

.ni{font-size:20px}

.ing-row:last-child{border-bottom:none}
.ing-row.done{background:var(--acbg)}
.ing-row.part{background:var(--wnbg)}

// ── ISO WEEK UTILITIES ─────────────────────────────────────────────────────
function getISOWeek(d=new Date()){
  const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=dt.getUTCDay()||7;
  dt.setUTCDate(dt.getUTCDate()+4-day);
  const yearStart=new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return{week:Math.ceil(((dt-yearStart)/86400000+1)/7),year:dt.getUTCFullYear()};
}
function weekId(offset=0){
  const d=new Date();d.setDate(d.getDate()+offset*7);
  const {week,year}=getISOWeek(d);
  return`${year}-W${String(week).padStart(2,"0")}`;
}
function weekLabel(wid){
  const m=wid.match(/(\d{4})-W(\d{2})/);if(!m) return wid;
  const year=parseInt(m[1]),week=parseInt(m[2]);
  // Monday of that ISO week
  const jan4=new Date(year,0,4);
  const dayOfWeek=(jan4.getDay()||7)-1;
  const mon=new Date(jan4);mon.setDate(jan4.getDate()-dayOfWeek+(week-1)*7);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const DE_MONTHS=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const fmt=x=>`${x.getDate()}. ${DE_MONTHS[x.getMonth()]}`;
  return`KW ${week} · ${fmt(mon)}–${fmt(sun)} ${year}`;
}
function weekShort(wid){
  const m=wid.match(/(\d{4})-W(\d{2})/);return m?`W${parseInt(m[2])}`:`${wid}`;
}

const db=()=>window.__db;

const FB={
  // Week paths (v2 schema)
  weekMeta:(wid)=>`mealprep/weeks/${wid}/meta`,
  weekSel:(wid)=>`mealprep/weeks/${wid}/selections`,
  weekState:(wid)=>`mealprep/weeks/${wid}/state`,
  pantryInv:()=>`mealprep/pantry/inventory`,
  pantryCustom:()=>`mealprep/pantry/custom`,
  profile:()=>`mealprep/profile`,
  favs:()=>`mealprep/profile/favourites`,
  history:()=>`mealprep/history`,
  settings:()=>`mealprep/settings`,
  recipes:()=>`mealprep/recipes`,

  async getOnce(path){return(await db().ref(path).once("value")).val();},
  async set(path,val){return db().ref(path).set(val);},
  async update(path,val){return db().ref(path).update(val);},
  async remove(path){return db().ref(path).remove();},
  sub(path,cb,ecb){
    const ref=db().ref(path);
    ref.on("value",snap=>cb(snap.val()),e=>{if(ecb)ecb(e);});
    return()=>ref.off("value");
  },
};

// ── AUTO-MIGRATION (v1 → v2 schema) ──────────────────────────────────────
async function runMigration(){
  try{
    const [weeksSnap,oldSel,oldState,oldPantry]=await Promise.all([
      FB.getOnce("mealprep/weeks"),
      FB.getOnce("mealprep/selections"),
      FB.getOnce("mealprep/state"),
      FB.getOnce("mealprep/pantry"),
    ]);
    if(!weeksSnap&&oldSel){
      const cid=weekId(0);
      const now=new Date();
      if(oldSel) await FB.set(FB.weekSel(cid),oldSel);
      if(oldState) await FB.set(FB.weekState(cid),oldState);
      const mon=new Date(now);mon.setDate(now.getDate()-(now.getDay()||7)+1);
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);
      await FB.set(FB.weekMeta(cid),{label:weekLabel(cid),startDate:mon.toISOString(),endDate:sun.toISOString(),status:"active"});
      // Migrate flat pantry to custom
      if(oldPantry&&typeof oldPantry==="object"){
        const hasNested=oldPantry.inventory||oldPantry.custom;
        if(!hasNested){
          const custom={};
          Object.entries(oldPantry).forEach(([k,v])=>{custom[k]=v;});
          await FB.set(FB.pantryCustom(),custom);
        }
      }
      console.log("✅ Migration v1→v2 complete:",cid);
    }
  }catch(e){console.warn("Migration skip:",e);}
}

// ── INGREDIENT NORMALISATION ──────────────────────────────────────────────
function normIngName(n){
  const l=(n||"").toLowerCase()
    .replace(/,?\s*bio\b/gi,"")
    .replace(/karotten-/g,"karotte-")
    .replace(/äpfel/g,"apfel")
    .replace(/tomaten\b/g,"tomate")
    .replace(/zwiebeln\b/g,"zwiebel")
    .replace(/karotten\b/g,"karotte")
    .replace(/kartoffeln\b/g,"kartoffel")
    .replace(/\s+/g," ").trim();
  return l;
}
function normShop(n){
  const l=(n||"").toLowerCase().trim();
  if(SPICES[l]) return SPICES[l];
  const alias=ING_ALIASES[l];
  if(alias) return alias;
  return n.replace(/,?\s*bio\b/gi,"").replace(/\s+/g," ").trim();
}
// Expand a single ingredient into potentially multiple (handles splits)
function expandIngredient(ing){
  const l=(ing.name||"").toLowerCase().trim();
  const targets=ING_SPLITS[l];
  if(targets){
    return targets.map((t,i)=>({...ing,id:`${ing.id}_x${i}`,name:t,_fromSplit:ing.id}));
  }
  return[ing];
}
function normStr(s){
  return(s||"").toLowerCase().replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss").replace(/[^a-z0-9\s]/g,"").trim();
}

// ── PRICE HELPERS ─────────────────────────────────────────────────────────
function estimateRecipePrice(recipe,pantryInventory={}){
  let total=0,unknown=false;
  recipe.ingredients.forEach(ing=>{
    const k=normIngName(ing.name);
    if(pantryInventory[k]?.qty>0){return;}// deduct if in pantry
    const price=REWE_PRICES[k];
    if(price!=null) total+=price;
    else unknown=true;
  });
  return{total:Math.round(total*100)/100,unknown};
}
function formatPrice(recipe,pantryInventory={}){
  const{total,unknown}=estimateRecipePrice(recipe,pantryInventory);
  if(total===0&&unknown) return"~?";
  return`~€${total.toFixed(2)}${unknown?"*":""}`;
}

// ── PARSE / SCALE / COMBINE AMOUNTS ──────────────────────────────────────
function parseAmt(s){
  if(!s) return null;
  const t=s.trim().replace(",",".");
  const m=t.match(/^([0-9.]+)\s*([a-zA-ZäöüÄÖÜ]*)$/);
  return m?{num:parseFloat(m[1]),unit:m[2].toLowerCase()}:null;
}
function scaleAmt(s,f){
  if(!s||f===1) return s;
  const p=parseAmt(s);if(!p) return s;
  const n=Math.round(p.num*f*10)/10;
  const ns=String(n).replace(".",",");
  const PIECE_UNITS2=["stück","stuck","pck","pkg","bund","scheibe","scheiben","zehe","zehen","dose","glas"];
  return s.replace(/([\d,]+(?:\.\d+)?)\s*([a-zA-ZäöüÄÖÜ]*)/, (_,_n,u)=>{
    if(!u) return ns;
    const lc=u.toLowerCase();
    return PIECE_UNITS2.includes(lc)?`${ns} ${u.charAt(0).toUpperCase()+u.slice(1).toLowerCase()}`:(`${ns}${lc}`);
  });
}
function combineAmts(arr){
  const bu={},up=[];
  arr.forEach(a=>{const p=parseAmt(a);if(p)bu[p.unit]=(bu[p.unit]||0)+p.num;else up.push(a);});
  const PIECE_UNITS=["stück","stuck","pck","pkg","bund","scheibe","scheiben","zehe","zehen","dose","glas","pkg"];
  const fmtUnit=(n,u)=>{if(!u) return n;const lc=u.toLowerCase();return PIECE_UNITS.includes(lc)?`${n} Stück`:`${n}${lc}`;};
  const parts=Object.entries(bu).map(([u,n])=>{const r=Math.round(n*10)/10;const sv=String(r).replace(".",",");return fmtUnit(sv,u);});
  return[...parts,...up].join(" + ");
}

// ── PROTEIN DETECTION ──────────────────────────────────────────────────────
function detectProtein(r){
  const t=(r.name+" "+r.ingredients.map(i=>i.name).join(" ")).toLowerCase();
  if(/lachs|forelle|fisch|salmon|thunfisch/.test(t)) return"fish";
  if(/schwein|schnitzel/.test(t)) return"pork";
  if(/rind|hackfleisch|frikadell/.test(t)) return"beef";
  if(/hähnchen|huhn|chicken/.test(t)) return"chicken";
  return"vegetarian";
}
function computeAutoStatus(have,need){
  if(!have||!have.trim()) return null;
  const hp=parseAmt(have),np=parseAmt(need);
  if(hp&&np){if(hp.num>=np.num) return"full";if(hp.num>0) return"partial";return"none";}
  return have.trim()?"full":"none";
}

    case"SET_VIEW":return{...state,view:action.view};
    case"SET_LOADING":return{...state,loading:action.v};
    case"SET_SYNC":return{...state,sync:action.v};
    case"SET_RECIPES":return{...state,recipes:action.v};
    case"SET_ING_STATE":return{...state,ingState:action.v};
    case"SET_SELS":return{...state,sels:action.v};

    case"SET_CUSTOM_PANTRY":return{...state,customPantry:action.v};
    case"SET_PANTRY_INV":return{...state,pantryInventory:action.v};
    case"SET_HISTORY":return{...state,history:action.v};
    case"SET_DARK_MODE":return{...state,darkMode:action.v};
    case"SET_WEEK":{
      return{...state,weekOffset:action.offset,weekId:weekId(action.offset)};
    }
    case"PATCH_ING":{
      const id=action.id;const upd={...state.ingState[id],...action.patch};
      return{...state,ingState:{...state.ingState,[id]:upd}};
    }
    case"PATCH_SEL":{
      return{...state,sels:{...state.sels,[action.key]:{...getSel(state.sels,action.key),...action.patch}}};
    }
    case"SET_FAV":{
      return{...state,profile:{...state.profile,favourites:{...state.profile.favourites,[action.key]:action.v}}};
    }
    case"SET_RATING":{
      return{...state,profile:{...state.profile,ratings:{...state.profile.ratings,[action.key]:action.v}}};
    }
    case"SET_NOTE":{
      return{...state,profile:{...state.profile,notes:{...state.profile.notes,[action.key]:action.v}}};
    }
    case"OPEN_RECIPE":return{...state,selRecipe:action.recipe};
    case"CLOSE_RECIPE":return{...state,selRecipe:null};
    case"SHOW_MODAL":return{...state,[action.modal]:true};
    case"HIDE_MODAL":return{...state,[action.modal]:false};
    default:return state;
  }
}

// ── SWIPE ITEM (shopping list) ────────────────────────────────────────────
function SwipeItem({children,onSwipeLeft,style}){
  const ref=useRef();const startX=useRef(0);const curX=useRef(0);const active=useRef(false);
  const handleStart=e=>{startX.current=e.touches[0].clientX;active.current=true;};
  const handleMove=e=>{
    if(!active.current) return;
    const dx=e.touches[0].clientX-startX.current;curX.current=dx;
    if(dx<0&&ref.current){ref.current.style.transform=`translateX(${Math.max(dx,-120)}px)`;}
  };
  const handleEnd=()=>{
    if(!active.current) return;active.current=false;
    if(curX.current<-60){
      if(ref.current) ref.current.style.transform="translateX(-100%)";
      setTimeout(()=>onSwipeLeft&&onSwipeLeft(),200);
    }else{
      if(ref.current) ref.current.style.transform="";
    }
    curX.current=0;
  };
  if(!FLAGS.swipeGestures) return<div style={style}>{children}</div>;
  return<div className="swipe-row" style={style} onTouchStart={handleStart} onTouchMove={handleMove} onTouchEnd={handleEnd}>
    <div className="swipe-bg">🗑 Entfernen</div>
    <div className="swipe-content" ref={ref}>{children}</div>
  </div>;
}

// ── ING ROW ───────────────────────────────────────────────────────────────
function IngRow({ing,rkey,rcolor,ingState,sels,updateIng,setIngStatus,saveIngName}){
  const[showNote,setShowNote]=useState(false);
  const s=ingState[ing.id]||{};
  const need=needAmt(ing,rkey,sels);
  const rowCls=`ing-row${s.status==="full"?" done":s.status==="partial"?" part":""}`;
  const onHaveChange=v=>{updateIng(ing.id,"have",v);const auto=computeAutoStatus(v,need);if(auto!==null)setIngStatus(ing.id,auto);};
  const onFullTap=()=>{setIngStatus(ing.id,"full");if(!(s.have||"").trim())updateIng(ing.id,"have",need);haptic(12);};
  const onNoneTap=()=>{setIngStatus(ing.id,"none");if((s.have||"").trim()===need.trim())updateIng(ing.id,"have","");};
  return(
    <div className={rowCls}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <EditInline value={ing.name} style={{fontSize:14,color:s.status==="full"?"var(--tx3)":"var(--tx)",textDecoration:s.status==="full"?"line-through":"none"}} onSave={v=>saveIngName(rkey,ing.id,v)}/>
        <button className="btn" onClick={()=>setShowNote(n=>!n)} style={{fontSize:13,color:s.note?"var(--wn)":"var(--tx3)",background:"none",padding:"0 2px",flexShrink:0}}>{s.note?"📝":"💬"}</button>
      </div>
      {(showNote||s.note)&&<textarea className="note-ta" placeholder="Notiz…" value={s.note||""} onChange={e=>updateIng(ing.id,"note",e.target.value)} rows={2}/>}
      <div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}>
        <span style={{fontSize:10,color:"var(--tx3)"}}>Benötigt</span>
        <div className="qb has" style={{borderColor:rcolor,cursor:"default",fontSize:12}}>{need}</div>
        <span style={{fontSize:10,color:"var(--tx3)"}}>Vorhanden</span>
        <QtyBox value={s.have||""} placeholder="—" color={rcolor} onChange={onHaveChange}/>
        <div style={{display:"flex",gap:3}}>
          <button className={`stb${s.status==="none"?" on":""}`} onClick={onNoneTap} style={s.status==="none"?{borderColor:rcolor,background:"#fff0f0"}:{}}>{SE.none}</button>
          <button className={`stb${s.status==="partial"?" on":""}`} onClick={()=>setIngStatus(ing.id,"partial")} style={s.status==="partial"?{borderColor:rcolor,background:"#fff8f0"}:{}}>{SE.partial}</button>
          <button className={`stb${s.status==="full"?" on":""}`} onClick={onFullTap} style={s.status==="full"?{borderColor:rcolor,background:"var(--acbg)"}:{}}>{SE.full}</button>
        </div>
      </div>
    </div>
  );
}

// ── RECIPE MODAL (v2: step photos, prep/cook timeline, price) ─────────────

  const mult=srv/2;
  const ptype=detectProtein(recipe);
  const p=PROTEINS[ptype];

  const note=profile?.notes?.[recipe.key]||"";
  const lastCooked=profile?.lastCooked?.[recipe.key];

    <div className="overlay" onClick={onClose}>

            <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,rgba(0,0,0,.05) 0%,rgba(0,0,0,.65) 100%)"}}/>
            <button onClick={onClose} className="btn" style={{position:"absolute",top:14,right:14,width:30,height:30,borderRadius:"50%",background:"rgba(0,0,0,.35)",color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"14px 18px"}}>
              <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                <ProteinTag type={ptype}/>
                <span style={{background:"rgba(255,255,255,.2)",color:"#fff",borderRadius:10,padding:"3px 8px",fontSize:11}}>{recipe.difficulty}</span>
                {recipe.kcal&&<span style={{background:"rgba(255,255,255,.2)",color:"#fff",borderRadius:10,padding:"3px 8px",fontSize:11}}>🔥 {recipe.kcal} kcal/P</span>}
              </div>
              <h2 style={{color:"#fff",fontWeight:"normal",fontSize:18,textShadow:"0 1px 4px rgba(0,0,0,.5)"}}>{recipe.name}</h2>
            </div>
          </div>
        ):(
          <div style={{padding:"20px 20px 14px",background:recipe.color,position:"relative"}}>
            <button onClick={onClose} className="btn" style={{position:"absolute",top:14,right:14,width:30,height:30,borderRadius:"50%",background:"rgba(255,255,255,.2)",color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            <div style={{fontSize:36,marginBottom:8}}>{recipe.emoji}</div>
            <h2 style={{color:"#fff",fontWeight:"normal",fontSize:18,marginBottom:6}}>{recipe.name}</h2>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <ProteinTag type={ptype}/>
              <span style={{fontSize:12,background:"rgba(255,255,255,.2)",padding:"2px 8px",borderRadius:10,color:"rgba(255,255,255,.9)"}}>{recipe.difficulty}</span>
              {recipe.kcal&&<span style={{fontSize:12,background:"rgba(255,255,255,.2)",padding:"2px 8px",borderRadius:10,color:"rgba(255,255,255,.9)"}}>🔥 {recipe.kcal}</span>}
              {FLAGS.prepCookSplit&&recipe.prepMins&&<span style={{fontSize:12,background:"rgba(255,255,255,.2)",padding:"2px 8px",borderRadius:10,color:"rgba(255,255,255,.9)"}}>✋ {recipe.prepMins} · 🔥 {recipe.cookMins}</span>}
            </div>

        <div style={{padding:"10px 18px 4px"}}>

          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>

        </div>

          <div style={{fontSize:11,color:"var(--tx3)",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Zutaten</div>
          {recipe.ingredients.map((ing,i)=>{
            const s=ingState[ing.id]||{};
            return<div key={ing.id} style={{display:"flex",alignItems:"center",padding:"9px 0",borderBottom:i<recipe.ingredients.length-1?"1px solid var(--bdr2)":"none",gap:10}}>

            const known=items.filter(i=>i.price!=null);

            if(!known.length) return null;
            return<div style={{marginTop:14,padding:"12px 14px",background:"var(--sur2)",borderRadius:10,border:"1px solid var(--bdr)"}}>

              {known.map(i=><div key={i.key} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"3px 0",borderBottom:"1px solid var(--bdr2)"}}>

              {recipe.instructions.map((s,idx)=>{
                const photoB64=recipe.stepPhotos&&idx<6?recipe.stepPhotos[idx]:null;
                return<div key={s.step} style={{marginBottom:16}}>
                  {photoB64&&<img src={`data:image/jpeg;base64,${photoB64}`} alt={`Schritt ${s.step}`} style={{width:"100%",borderRadius:10,height:180,objectFit:"cover",marginBottom:8}}/>}

  );
}

// ── RECIPE CARD (v2: swipe, price, ratings, week chip, long-press) ─────────
function RecipeCard({recipe,ingState,sels,profile,currentWeekId,pantryInventory,onToggleSel,onToggleFav,onServChange,onOpenRecipe,onLongPress}){
  const sel=getSel(sels,recipe.key);const isSel=sel.selected;
  const ptype=detectProtein(recipe);const p=PROTEINS[ptype];
  const isFav=!!profile?.favourites?.[recipe.key];
  const rating=profile?.ratings?.[recipe.key]||0;
  const lastCooked=profile?.lastCooked?.[recipe.key];
  const done=recipe.ingredients.filter(i=>ingState[i.id]?.status==="full").length;
  const pct=recipe.ingredients.length?Math.round((done/recipe.ingredients.length)*100):0;
  const price=FLAGS.priceEstimates?formatPrice(recipe,pantryInventory):null;
  const[flash,setFlash]=useState("");
  const longPressTimer=useRef();
  const startX=useRef(0);const moved=useRef(false);
  // Swipe select/deselect on card
  const handleTouchStart=e=>{startX.current=e.touches[0].clientX;moved.current=false;longPressTimer.current=setTimeout(()=>{haptic([10,30,10]);onLongPress&&onLongPress(recipe);},600);};
  const handleTouchMove=e=>{const dx=Math.abs(e.touches[0].clientX-startX.current);if(dx>10){moved.current=true;clearTimeout(longPressTimer.current);}};
  const handleTouchEnd=e=>{
    clearTimeout(longPressTimer.current);
    if(!moved.current) return;
    const dx=e.changedTouches[0].clientX-startX.current;
    if(FLAGS.swipeGestures&&Math.abs(dx)>50){
      if(dx>0&&!isSel){onToggleSel(recipe.key);setFlash("flash-green");haptic(12);showToast("✓ Rezept ausgewählt");setTimeout(()=>setFlash(""),400);}
      else if(dx<0&&isSel){onToggleSel(recipe.key);setFlash("flash-red");haptic(12);showToast("✗ Rezept abgewählt");setTimeout(()=>setFlash(""),400);}
    }
  };
  return(
    <div className={`card ${flash}`} style={{transition:"transform .15s"}}
      onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
      {recipe.photo&&(
        <div style={{height:160,overflow:"hidden",position:"relative",cursor:"pointer"}} onClick={()=>onOpenRecipe(recipe)}>
          <img src={recipe.photo} alt={recipe.name} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center 35%"}}/>
          <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.5))"}}/>
          <span style={{position:"absolute",bottom:10,left:12,fontSize:20}}>{recipe.emoji}</span>
          <span className="ptag" style={{position:"absolute",top:10,left:10,background:p.color}}>{p.emoji} {p.label}</span>
          {recipe.kcal&&<span style={{position:"absolute",top:10,right:10,background:"rgba(0,0,0,.45)",color:"#fff",borderRadius:10,padding:"3px 8px",fontSize:11}}>🔥 {recipe.kcal}</span>}
        </div>
      )}
      <div style={{display:"flex",alignItems:"stretch"}}>
        <div style={{width:6,background:isSel?recipe.color:"var(--bdr)",flexShrink:0,transition:"background .3s"}}/>
        <div style={{padding:"12px 14px",flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:4}}>
            {!recipe.photo&&<span style={{fontSize:22,flexShrink:0}}>{recipe.emoji}</span>}
            <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>onOpenRecipe(recipe)}>
              <div style={{fontSize:15,fontWeight:"bold",color:"var(--tx)",marginBottom:2,lineHeight:1.3}}>{recipe.name}</div>
              {!recipe.photo&&<ProteinTag type={ptype}/>}
              <div style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>
                {recipe.difficulty}
                {FLAGS.prepCookSplit&&recipe.prepMins?` · ✋ ${recipe.prepMins} · 🔥 ${recipe.cookMins} Min`:` · ⏱ ${recipe.time}`}
                {recipe.kcal?` · 🔥 ${recipe.kcal}`:""}
              </div>
            </div>
            <button className="btn" onClick={()=>onToggleFav(recipe.key)} style={{fontSize:20,background:"none",padding:"0 4px",color:isFav?"#f0a500":"var(--tx3)",flexShrink:0}}>{isFav?"⭐":"☆"}</button>
          </div>
          {/* Stars + tags row */}
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,flexWrap:"wrap"}}>
            {rating>0&&<StarRating value={rating} size={12}/>}
            {lastCooked&&<span style={{fontSize:10,color:"var(--tx3)"}}>Zuletzt {weekShort(lastCooked)}</span>}
            {isSel&&<WeekChip wid={currentWeekId}/>}
            {price&&<span style={{fontSize:10,color:"var(--ac)",background:"var(--acbg)",padding:"2px 6px",borderRadius:8}}>{price}</span>}
          </div>
          {/* Progress bar */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <div style={{flex:1,height:4,background:"var(--bdr)",borderRadius:2,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${pct}%`,background:recipe.color,transition:"width .4s"}}/>
            </div>
            <span style={{fontSize:11,color:"var(--tx3)",flexShrink:0}}>{done}/{recipe.ingredients.length}</span>
          </div>
          {/* Select + servings */}
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button className={`btn${FLAGS.springAnimations?" pulse-select":""}`} onClick={()=>{onToggleSel(recipe.key);haptic(12);if(!isSel)showToast("✓ Rezept ausgewählt");}} style={{flex:1,padding:"7px 12px",borderRadius:10,fontSize:13,fontWeight:"bold",background:isSel?recipe.color:"var(--sur2)",color:isSel?"#fff":"var(--tx2)",border:`1.5px solid ${isSel?recipe.color:"var(--bdr)"}`}}>
              {isSel?"✓ Ausgewählt":"+ Auswählen"}
            </button>
            {isSel&&(
              <div style={{display:"flex",alignItems:"center",gap:6,background:"var(--sur2)",borderRadius:10,padding:"5px 10px",border:"1px solid var(--bdr)"}}>
                <button className="btn" onClick={()=>onServChange(recipe.key,Math.max(1,sel.servings-1))} style={{fontSize:16,background:"none",color:"var(--tx2)",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                <span style={{fontSize:13,minWidth:20,textAlign:"center",color:"var(--tx)",fontWeight:"bold"}}>{sel.servings}</span>
                <button className="btn" onClick={()=>onServChange(recipe.key,Math.min(10,sel.servings+1))} style={{fontSize:16,background:"none",color:"var(--tx2)",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                <span style={{fontSize:10,color:"var(--tx3)"}}>P</span>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── RECIPES VIEW ──────────────────────────────────────────────────────────
function RecipesView({recipes,ingState,sels,profile,currentWeekId,pantryInventory,onToggleSel,onToggleFav,onServChange,onOpenRecipe}){
  const[q,setQ]=useState("");
  const[pFilter,setPFilter]=useState("all");
  const[diffFilter,setDiffFilter]=useState("all");
  const[timeFilter,setTimeFilter]=useState("all");
  const[activeFilter,setActiveFilter]=useState(false);
  const[kcalFilter,setKcalFilter]=useState("all");
  const[sortBy,setSortBy]=useState("order");
  const[favOnly,setFavOnly]=useState(false);
  const[longPressRecipe,setLongPressRecipe]=useState(null);

  const filtered=useMemo(()=>{
    const lq=q.toLowerCase();
    return recipes.filter(r=>{
      if(favOnly&&!profile?.favourites?.[r.key]) return false;
      if(pFilter!=="all"&&detectProtein(r)!==pFilter) return false;
      if(diffFilter!=="all"&&r.difficulty!==diffFilter) return false;
      if(timeFilter!=="all"){
        const parts=r.time.match(/\d+/g)||["0"];
        const t=parseInt(parts[parts.length-1]);
        if(timeFilter==="25"&&t>25) return false;
        if(timeFilter==="35"&&t>35) return false;
        if(timeFilter==="45"&&t>45) return false;
      }
      if(activeFilter&&FLAGS.prepCookSplit){
        if((r.prepMins||99)>20) return false;
      }
      if(kcalFilter!=="all"&&r.kcal){
        if(kcalFilter==="700"&&r.kcal>700) return false;
        if(kcalFilter==="850"&&r.kcal>850) return false;
        if(kcalFilter==="950"&&r.kcal>950) return false;
      }
      if(!lq) return true;
      if(r.name.toLowerCase().includes(lq)) return true;
      if(r.description.toLowerCase().includes(lq)) return true;
      if(r.ingredients.some(i=>i.name.toLowerCase().includes(lq))) return true;
      return false;
    }).sort((a,b)=>{
      if(sortBy==="order") return a.order-b.order;
      if(sortBy==="time"){const tm=x=>{const p=(x.time||"0").match(/\d+/g)||["0"];return parseInt(p[p.length-1]);};return tm(a)-tm(b);}
      if(sortBy==="kcal") return(a.kcal||999)-(b.kcal||999);
      if(sortBy==="rating") return(profile?.ratings?.[b.key]||0)-(profile?.ratings?.[a.key]||0);
      if(sortBy==="stocked"){
        const pctA=a.ingredients.filter(i=>ingState[i.id]?.status==="full").length/a.ingredients.length;
        const pctB=b.ingredients.filter(i=>ingState[i.id]?.status==="full").length/b.ingredients.length;
        return pctB-pctA;
      }
      return 0;
    });
  },[recipes,ingState,sels,profile,q,pFilter,diffFilter,timeFilter,activeFilter,kcalFilter,sortBy,favOnly]);

  const selectedCount=recipes.filter(r=>getSel(sels,r.key).selected).length;
  return(
    <div style={{padding:"12px 12px 20px",maxWidth:660,margin:"0 auto"}}>
      {longPressRecipe&&<QuickRatingSheet recipe={longPressRecipe} profile={profile} onSetRating={(k,v)=>{FB.set(`${FB.favs()}/${k}/rating`,v);}} onSetNote={(k,v)=>{FB.set(`${FB.favs()}/${k}/notes`,v);}} onClose={()=>setLongPressRecipe(null)}/>}
      <input className="sbar" placeholder="🔍 Rezepte, Zutaten, Protein…" value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:8}}/>
      <div style={{marginBottom:12}}>
        <div className="fbar" style={{gap:6,paddingBottom:8}}>
          <button className={`chip${favOnly?" on":""}`} onClick={()=>setFavOnly(f=>!f)}>⭐ Favoriten</button>
          <div style={{width:1,background:"var(--bdr)",flexShrink:0,alignSelf:"stretch",margin:"4px 0"}}/>
          {FLAGS.prepCookSplit&&<button className={`chip${activeFilter?" on":""}`} onClick={()=>setActiveFilter(f=>!f)}>⚡ Aktiv ≤20 Min</button>}
          <button className={`chip${timeFilter==="25"?" on":""}`} onClick={()=>setTimeFilter(timeFilter==="25"?"all":"25")}>⚡ &lt;25 Min</button>
          <button className={`chip${timeFilter==="35"?" on":""}`} onClick={()=>setTimeFilter(timeFilter==="35"?"all":"35")}>⏱ &lt;35 Min</button>
          <div style={{width:1,background:"var(--bdr)",flexShrink:0,alignSelf:"stretch",margin:"4px 0"}}/>
          <button className={`chip${kcalFilter==="700"?" on":""}`} onClick={()=>setKcalFilter(kcalFilter==="700"?"all":"700")}>🔥 &lt;700</button>
          <button className={`chip${kcalFilter==="850"?" on":""}`} onClick={()=>setKcalFilter(kcalFilter==="850"?"all":"850")}>🔥 &lt;850</button>
          <div style={{width:1,background:"var(--bdr)",flexShrink:0,alignSelf:"stretch",margin:"4px 0"}}/>
          {Object.entries(PROTEINS).map(([k,p])=>(
            <button key={k} className={`chip${pFilter===k?" on":""}`} onClick={()=>setPFilter(pFilter===k?"all":k)} style={pFilter===k?{borderColor:p.color,background:p.color+"22",color:p.color}:{}}>{p.emoji} {p.label}</button>
          ))}
          <div style={{width:1,background:"var(--bdr)",flexShrink:0,alignSelf:"stretch",margin:"4px 0"}}/>
          <button className={`chip${diffFilter==="Einfach"?" on":""}`} onClick={()=>setDiffFilter(diffFilter==="Einfach"?"all":"Einfach")}>🟢 Einfach</button>
          <button className={`chip${diffFilter==="Mittel"?" on":""}`} onClick={()=>setDiffFilter(diffFilter==="Mittel"?"all":"Mittel")}>🟡 Mittel</button>
          <div style={{width:1,background:"var(--bdr)",flexShrink:0,alignSelf:"stretch",margin:"4px 0"}}/>
          <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{padding:"5px 10px",borderRadius:20,fontSize:12,border:"1.5px solid var(--bdr)",color:"var(--tx)",flexShrink:0,background:"var(--sur)"}}>
            <option value="order">🔢 Standard</option>
            <option value="stocked">✅ Vorrätig</option>
            <option value="time">⏱ Zeit</option>
            <option value="kcal">🔥 kcal</option>
            <option value="rating">⭐ Bewertung</option>
          </select>
        </div>
        {(favOnly||pFilter!=="all"||diffFilter!=="all"||timeFilter!=="all"||kcalFilter!=="all"||activeFilter)&&(
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginTop:2}}>
            <span style={{fontSize:11,color:"var(--tx3)"}}>Aktiv:</span>
            {favOnly&&<span style={{fontSize:11,background:"var(--acbg)",color:"var(--ac)",padding:"2px 8px",borderRadius:10}}>⭐ Fav</span>}
            {activeFilter&&<span style={{fontSize:11,background:"var(--acbg)",color:"var(--ac)",padding:"2px 8px",borderRadius:10}}>⚡ Aktiv</span>}
            {pFilter!=="all"&&<span style={{fontSize:11,background:PROTEINS[pFilter].color+"22",color:PROTEINS[pFilter].color,padding:"2px 8px",borderRadius:10}}>{PROTEINS[pFilter].emoji} {PROTEINS[pFilter].label}</span>}
            {diffFilter!=="all"&&<span style={{fontSize:11,background:"var(--acbg)",color:"var(--ac)",padding:"2px 8px",borderRadius:10}}>{diffFilter}</span>}
            {timeFilter!=="all"&&<span style={{fontSize:11,background:"var(--acbg)",color:"var(--ac)",padding:"2px 8px",borderRadius:10}}>{"<"+timeFilter+" Min"}</span>}
            {kcalFilter!=="all"&&<span style={{fontSize:11,background:"var(--acbg)",color:"var(--ac)",padding:"2px 8px",borderRadius:10}}>{"<"+kcalFilter+" kcal"}</span>}
            <button className="btn" onClick={()=>{setFavOnly(false);setPFilter("all");setDiffFilter("all");setTimeFilter("all");setKcalFilter("all");setActiveFilter(false);}} style={{fontSize:11,color:"var(--dan)",background:"none",padding:"2px 4px",marginLeft:"auto"}}>× Alles zurücksetzen</button>
          </div>
        )}
      </div>
      {selectedCount>0&&<div style={{fontSize:12,color:"var(--ac)",marginBottom:10,padding:"6px 12px",background:"var(--acbg)",borderRadius:8}}>✅ {selectedCount} Rezept{selectedCount>1?"e":""} ausgewählt für <strong>{weekShort(currentWeekId)}</strong></div>}
      {filtered.map(recipe=>(
        <RecipeCard key={recipe.key} recipe={recipe} ingState={ingState} sels={sels} profile={profile}
          currentWeekId={currentWeekId} pantryInventory={pantryInventory}
          onToggleSel={onToggleSel} onToggleFav={onToggleFav} onServChange={onServChange}
          onOpenRecipe={onOpenRecipe} onLongPress={r=>setLongPressRecipe(r)}/>
      ))}
      {filtered.length===0&&<div style={{textAlign:"center",padding:"60px 20px",color:"var(--tx3)"}}><div style={{fontSize:40,marginBottom:12}}>🔍</div><div>Keine Rezepte gefunden.</div></div>}
    </div>
  );
}

// ── CHECKLIST VIEW ────────────────────────────────────────────────────────
function ChecklistView({recipes,ingState,sels,updateIng,setIngStatus,saveIngName}){
  const[q,setQ]=useState("");
  const lq=q.toLowerCase();
  const selRecipes=recipes.filter(r=>getSel(sels,r.key).selected);
  if(selRecipes.length===0) return(
    <div style={{textAlign:"center",padding:"60px 20px",color:"var(--tx3)"}}>
      <div style={{fontSize:48,marginBottom:12}}>📋</div>
      <div style={{fontSize:14,lineHeight:1.6}}>Keine Rezepte ausgewählt.<br/>Wähle Rezepte im Rezepte-Tab aus.</div>
    </div>
  );
  const allDone=selRecipes.every(r=>r.ingredients.every(i=>ingState[i.id]?.status==="full"));
  return(
    <div style={{padding:"12px 12px 20px",maxWidth:660,margin:"0 auto"}}>
      <input className="sbar" placeholder="🔍 Zutaten suchen…" value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:12}}/>
      {allDone&&<div className="slide-up" style={{textAlign:"center",padding:"16px",background:"var(--acbg)",borderRadius:12,marginBottom:12,border:"1px solid var(--ac)"}}>
        <div style={{fontSize:28,marginBottom:4}}>✅</div>
        <div style={{fontSize:14,color:"var(--ac)",fontWeight:"bold"}}>Alles vorrätig — bereit zum Einkauf!</div>
      </div>}
      {selRecipes.map(recipe=>{
        const ings=recipe.ingredients.filter(i=>!lq||i.name.toLowerCase().includes(lq));
        if(!ings.length) return null;
        const done=recipe.ingredients.filter(i=>ingState[i.id]?.status==="full").length;
        const isRecipeDone=done===recipe.ingredients.length;
        return(
          <div key={recipe.key} className={`card${isRecipeDone?" slide-up":""}`}>
            <div style={{padding:"11px 16px",background:recipe.color,display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:18}}>{recipe.emoji}</span>
              <span style={{color:"#fff",fontSize:14,flex:1,minWidth:0}}>{recipe.name}</span>
              <span style={{color:"rgba(255,255,255,.75)",fontSize:12,flexShrink:0}}>{done}/{recipe.ingredients.length} ✅</span>
            </div>
            {ings.map(ing=>(
              <IngRow key={ing.id} ing={ing} rkey={recipe.key} rcolor={recipe.color}
                ingState={ingState} sels={sels} updateIng={updateIng} setIngStatus={setIngStatus} saveIngName={saveIngName}/>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ── SHOPPING VIEW (v2: swipe-to-dismiss, strike-through, hide/clear checked) ──
function ShoppingView({recipes,ingState,sels,onShare,setIngStatus,pantryInventory}){
  const[sv,setSv]=useState("combined");
  const[q,setQ]=useState("");
  const[checkedIds,setCheckedIds]=useState({});// local struck-through state
  const[hideChecked,setHideChecked]=useState(false);
  const lq=q.toLowerCase();
  const selRecipes=recipes.filter(r=>getSel(sels,r.key).selected);

  const allMissing=useMemo(()=>{
    const map={};
    selRecipes.forEach(r=>r.ingredients.forEach(ing=>{
      if(ingState[ing.id]?.status==="full") return;
      const pInv=pantryInventory[normIngName(ing.name)];if(pInv?.qty) return;// in pantry
      const expanded=expandIngredient(ing);
      expanded.forEach(eing=>{
        const display=normShop(eing.name);
        const key=normIngName(eing.name);
        if(!map[key]){map[key]={name:display,orig:eing.name,ids:[ing.id],amounts:[],recs:[],aisle:ing.aisle||"other",status:"none"};}
        else{if(display.length<map[key].name.length){map[key].name=display;map[key].orig=eing.name;}map[key].ids.push(ing.id);}
        map[key].amounts.push(needAmt(ing,r.key,sels));
        map[key].recs.push(r.emoji+" "+r.name);
        if(ingState[ing.id]?.status==="partial") map[key].status="partial";
      });
    }));
    return Object.values(map).filter(i=>!lq||i.name.toLowerCase().includes(lq)||i.orig.toLowerCase().includes(lq)).sort((a,b)=>a.name.localeCompare(b.name));
  },[selRecipes,ingState,sels,lq]);

  const byAisle=useMemo(()=>{
    const g={};
    allMissing.forEach(i=>{const a=i.aisle||"other";if(!g[a])g[a]=[];g[a].push(i);});
    return Object.entries(g).sort((a,b)=>(AISLES[a[0]]?.order||99)-(AISLES[b[0]]?.order||99));
  },[allMissing]);

  const markItem=(item)=>{
    const itemKey=normIngName(item.name);
    const isChecked=!!checkedIds[itemKey];
    if(!isChecked){setCheckedIds(c=>({...c,[itemKey]:true}));haptic(12);showToast("🛒 Artikel abgehakt");}
    else{setCheckedIds(c=>{const n={...c};delete n[itemKey];return n;});}
  };
  const confirmPurchases=()=>{
    Object.keys(checkedIds).forEach(itemKey=>{
      const item=allMissing.find(i=>normIngName(i.name)===itemKey);
      if(item) item.ids.forEach(id=>setIngStatus(id,"full"));
    });
    setCheckedIds({});showToast("✅ Einkauf abgeschlossen!");haptic([10,50,10]);
  };
  const clearChecked=()=>{setCheckedIds({});};
  const checkedCount=Object.keys(checkedIds).length;

  if(selRecipes.length===0) return<div style={{textAlign:"center",padding:"60px 20px",color:"var(--tx3)"}}><div style={{fontSize:40}}>🛒</div><div style={{marginTop:12}}>Keine Rezepte ausgewählt.</div></div>;
  if(allMissing.length===0) return<div style={{textAlign:"center",padding:"60px 20px",color:"var(--ac)"}}><div style={{fontSize:56}}>🎉</div><h2 style={{fontWeight:"normal",marginTop:14,color:"var(--tx)"}}>Alles vorrätig!</h2></div>;

  return(
    <div style={{padding:"12px 12px 20px",maxWidth:660,margin:"0 auto"}}>
      <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
        <input className="sbar" style={{marginBottom:0,flex:1}} placeholder="🔍 Suchen…" value={q} onChange={e=>setQ(e.target.value)}/>
        <button className="btn" onClick={onShare} style={{padding:"9px 14px",borderRadius:10,background:"var(--ac)",color:"#fff",fontSize:13,fontWeight:"bold",flexShrink:0}}>📤</button>
      </div>
      {/* Controls */}
      <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{padding:"5px 10px",background:"var(--acbg)",borderRadius:8,border:"1px solid var(--bdr)",fontSize:11,color:"var(--ac)",flex:1}}>
          💡 Tippen = abhaken · Wischen = entfernen
        </div>
        {checkedCount>0&&<>
          <button className="btn" onClick={()=>setHideChecked(h=>!h)} style={{fontSize:12,padding:"5px 10px",borderRadius:8,background:"var(--sur2)",border:"1px solid var(--bdr)",color:"var(--tx2)"}}>{hideChecked?"Alle zeigen":"Erledigte ausblenden"}</button>
          <button className="btn" onClick={confirmPurchases} style={{fontSize:12,padding:"5px 10px",borderRadius:8,background:"var(--ac)",color:"#fff",fontWeight:"bold"}}>✅ Bestätigen ({checkedCount})</button>
          <button className="btn" onClick={clearChecked} style={{fontSize:12,padding:"5px 10px",borderRadius:8,background:"var(--sur2)",border:"1px solid var(--bdr)",color:"var(--tx3)"}}>✕</button>
        </>}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,background:"var(--sur)",borderRadius:12,padding:5,border:"1px solid var(--bdr)"}}>
        {[["combined","🧺 Kombiniert"],["by-recipe","📋 Pro Rezept"]].map(([v,l])=>(
          <button key={v} className="btn" onClick={()=>setSv(v)} style={{flex:1,padding:"9px 10px",borderRadius:8,fontSize:13,background:sv===v?"var(--hd)":"transparent",color:sv===v?"#fff":"var(--tx2)",fontWeight:sv===v?"bold":"normal"}}>{l}</button>
        ))}
      </div>
      {sv==="combined"&&(
        <div className="card">
          <div style={{padding:"11px 16px",background:"#2d4a35",display:"flex",alignItems:"center"}}>
            <span style={{color:"#fff",fontSize:14}}>🧺 Einkaufsliste</span>
            <span style={{marginLeft:"auto",color:"rgba(255,255,255,.7)",fontSize:12}}>{allMissing.length} Artikel</span>
          </div>
          {byAisle.map(([ak,items])=>(
            <React.Fragment key={ak}>
              <div className="aisle-h">{AISLES[ak]?.label||"🛒 Sonstiges"}</div>
              {items.map((item,i)=>{
                const itemKey=normIngName(item.name);
                const isChecked=!!checkedIds[itemKey];
                if(hideChecked&&isChecked) return null;
                const c=combineAmts(item.amounts);
                const multi=item.recs.length>1;
                return(
                  <SwipeItem key={item.name} onSwipeLeft={()=>{markItem(item);}}>
                    <div onClick={()=>markItem(item)}
                      style={{display:"flex",alignItems:"flex-start",padding:"11px 16px",gap:10,borderBottom:i<items.length-1?"1px solid var(--bdr2)":"none",background:multi?"var(--multi-bg)":"var(--sur)",cursor:"pointer",opacity:isChecked?.6:1,transition:"opacity .3s"}}>
                      <span style={{fontSize:15,flexShrink:0,marginTop:1}}>{isChecked?"✅":item.status==="partial"?"⚠️":"❌"}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:14,color:"var(--tx)",wordBreak:"break-word",textDecoration:isChecked?"line-through":"none"}}>{item.name}</div>
                        {item.name!==item.orig&&<div style={{fontSize:10,color:"var(--tx3)",marginTop:1}}>orig: {item.orig}</div>}
                        {multi&&<div style={{fontSize:10,color:"var(--tx3)",marginTop:3,lineHeight:1.4}}>{item.recs.join(" · ")}</div>}
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:13,fontWeight:"bold",color:"var(--tx)"}}>{c}</div>
                        {multi&&<div style={{fontSize:10,color:"var(--tx3)"}}>{item.amounts.join(" + ")}</div>}
                      </div>
                    </div>
                  </SwipeItem>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      )}
      {sv==="by-recipe"&&selRecipes.map(recipe=>{
        const missing=recipe.ingredients.filter(i=>ingState[i.id]?.status!=="full"&&(!lq||i.name.toLowerCase().includes(lq)));
        if(!missing.length) return null;
        return(
          <div key={recipe.key} className="card">
            <div style={{padding:"10px 16px",background:recipe.color+"22",borderBottom:"1px solid var(--bdr)",display:"flex",gap:8,alignItems:"center"}}>
              <span>{recipe.emoji}</span>
              <span style={{fontSize:13,color:recipe.color,fontWeight:"bold"}}>{recipe.name}</span>
              <span style={{marginLeft:"auto",fontSize:11,color:"var(--tx3)"}}>{missing.length} Artikel</span>
            </div>
            {missing.map((ing,i)=>{
              const s=ingState[ing.id]||{};
              const need=needAmt(ing,recipe.key,sels);
              return(
                <div key={ing.id} style={{display:"flex",alignItems:"center",padding:"11px 16px",gap:10,borderBottom:i<missing.length-1?"1px solid var(--bdr2)":"none"}}>
                  <span style={{fontSize:15,flexShrink:0}}>{s.status==="partial"?"⚠️":"❌"}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,color:"var(--tx)",wordBreak:"break-word"}}>{normShop(ing.name)}</div>
                    {normShop(ing.name)!==ing.name&&<div style={{fontSize:10,color:"var(--tx3)"}}>orig: {ing.name}</div>}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:13,fontWeight:"bold",color:"var(--tx)"}}>{need}</div>
                    {s.status==="partial"&&s.have&&<div style={{fontSize:11,color:"var(--wn)"}}>Hab: {s.have}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── PANTRY VIEW (v2: living inventory, qty/unit on all items) ────────────────
function PantryView({recipes,ingState,customPantry,pantryInventory,onAdd,onRemove,updateIng,setIngStatus,onUpdatePantryInv}){
  const[q,setQ]=useState("");
  const[showAdd,setShowAdd]=useState(false);
  const[editingQty,setEditingQty]=useState(null);// {key, value}
  const lq=q.toLowerCase();

  // Build unified item list from all recipe ingredients
  const allItems=useMemo(()=>{
    const map={};
    recipes.forEach(r=>{
      r.ingredients.forEach(ing=>{
        const k=normIngName(ing.name);
        if(!map[k]){map[k]={id:ing.id,ids:[ing.id],name:ing.name,color:r.color,recipes:[r.name],aisle:ing.aisle||"other",needAmt:ing.amount};}
        else{if(!map[k].ids.includes(ing.id))map[k].ids.push(ing.id);if(!map[k].recipes.includes(r.name))map[k].recipes.push(r.name);}
      });
    });
    return Object.values(map).filter(i=>!lq||i.name.toLowerCase().includes(lq)).sort((a,b)=>a.name.localeCompare(b.name));
  },[recipes,lq]);

  const custom=useMemo(()=>Object.entries(customPantry||{}).filter(([,v])=>!lq||v.name.toLowerCase().includes(lq)),[customPantry,lq]);
  const stocked=allItems.filter(i=>{const s=ingState[i.id]||{};return s.status==="full"||s.status==="partial";});
  const notStocked=allItems.filter(i=>{const s=ingState[i.id]||{};return !s.status||s.status==="none";});

  const setItemStatus=(item,next)=>{
    item.ids.forEach(id=>{
      setIngStatus(id,next);
      if(next==="full"&&!(ingState[id]?.have||"").trim()) updateIng(id,"have","✓");
      if(next==="none") updateIng(id,"have","");
    });
    if(next==="full") haptic(12);
  };

  // Update qty/unit in pantry inventory (separate from ingState status)
  const saveQty=(normKey,qtyStr,unit)=>{
    if(!qtyStr.trim()){
      onUpdatePantryInv(normKey,null);
    }else{
      onUpdatePantryInv(normKey,{qty:qtyStr.trim(),unit:unit||"",lastUpdated:Date.now()});
    }
    setEditingQty(null);
  };

  // Inline qty editor component
  const QtyEditor=({item})=>{
    const normKey=normIngName(item.name);
    const inv=pantryInventory[normKey];
    const isEditing=editingQty?.key===normKey;
    const[localVal,setLocalVal]=useState(inv?.qty||"");
    const[localUnit,setLocalUnit]=useState(inv?.unit||"");
    useEffect(()=>{setLocalVal(inv?.qty||"");setLocalUnit(inv?.unit||"");},[inv?.qty,inv?.unit]);
    if(isEditing) return(
      <div style={{display:"flex",gap:4,alignItems:"center"}} onClick={e=>e.stopPropagation()}>
        <input autoFocus value={localVal} onChange={e=>setLocalVal(e.target.value)}
          onKeyDown={e=>{if(e.key==="Enter")saveQty(normKey,localVal,localUnit);if(e.key==="Escape")setEditingQty(null);}}
          onBlur={()=>saveQty(normKey,localVal,localUnit)}
          style={{width:52,fontSize:12,padding:"3px 5px",borderRadius:6,textAlign:"center",border:"1.5px solid var(--ac)"}}
          placeholder="Menge"/>
        <select value={localUnit} onChange={e=>setLocalUnit(e.target.value)}
          style={{fontSize:11,padding:"3px 4px",borderRadius:6,border:"1px solid var(--bdr)",background:"var(--sur2)",maxWidth:52}}>
          {["","g","kg","ml","l","Stück","EL","TL","Pck"].map(u=><option key={u} value={u}>{u||"—"}</option>)}
        </select>
      </div>
    );
    return(
      <div onClick={e=>{e.stopPropagation();setEditingQty({key:normKey});setLocalVal(inv?.qty||"");setLocalUnit(inv?.unit||"");}}
        style={{minWidth:52,textAlign:"right",cursor:"text"}}>
        {inv?.qty
          ?<span style={{fontSize:12,fontWeight:"bold",color:"var(--ac)",background:"var(--acbg)",padding:"2px 6px",borderRadius:6}}>{inv.qty}{inv.unit}</span>
          :<span style={{fontSize:11,color:"var(--bdr)",border:"1px dashed var(--bdr)",padding:"2px 6px",borderRadius:6}}>+ Menge</span>
        }
      </div>
    );
  };

  const ItemRow=({item})=>{
    const s=ingState[item.id]||{};
    const isHave=s.status==="full"||s.status==="partial";
    return(
      <div style={{display:"flex",alignItems:"center",padding:"10px 14px",gap:10}}>
        <div style={{width:4,height:32,borderRadius:2,background:isHave?item.color:"var(--bdr)",flexShrink:0,transition:"background .2s"}}/>
        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>setItemStatus(item,isHave?"none":"full")}>
          <div style={{fontSize:14,color:isHave?"var(--tx)":"var(--tx3)",fontWeight:isHave?"bold":"normal"}}>{item.name}</div>
          <div style={{fontSize:10,color:"var(--tx3)",marginTop:1,lineHeight:1.3}}>{item.recipes.slice(0,3).join(", ")}{item.recipes.length>3?` +${item.recipes.length-3}`:""}</div>
        </div>
        <QtyEditor item={item}/>
        <button onClick={()=>setItemStatus(item,isHave?"none":"full")}
          style={{fontSize:18,background:"none",border:"none",cursor:"pointer",flexShrink:0,width:28,textAlign:"center"}}>
          {isHave?"✅":"☐"}
        </button>
      </div>
    );
  };

  const stockedCount=stocked.length;
  const totalCount=allItems.length;

  return(
    <div style={{padding:"12px 12px 20px",maxWidth:660,margin:"0 auto"}}>
      {showAdd&&<AddPantryModal onAdd={data=>{onAdd("cp_"+Date.now(),data);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
      {/* Header bar */}
      <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
        <input className="sbar" style={{flex:1,marginBottom:0}} placeholder="🔍 Vorrat suchen…" value={q} onChange={e=>setQ(e.target.value)}/>
        <button className="btn" onClick={()=>setShowAdd(true)} style={{padding:"9px 14px",borderRadius:10,background:"var(--ac)",color:"#fff",fontSize:13,fontWeight:"bold",flexShrink:0}}>+ Add</button>
      </div>
      {/* Summary strip */}
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",padding:"8px 12px",background:"var(--acbg)",borderRadius:10,border:"1px solid var(--bdr)"}}>
        <div style={{flex:1,height:6,background:"var(--bdr)",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:totalCount?`${(stockedCount/totalCount)*100}%`:"0%",background:"var(--ac)",transition:"width .4s",borderRadius:3}}/>
        </div>
        <span style={{fontSize:12,color:"var(--ac)",fontWeight:"bold",flexShrink:0}}>{stockedCount}/{totalCount} vorrätig</span>
      </div>
      <p style={{fontSize:11,color:"var(--tx3)",marginBottom:10,paddingLeft:2}}>Tippe ✅/☐ um Status zu ändern · Tippe Mengenfeld um Vorrat einzutragen</p>

      {/* Custom items */}
      {custom.length>0&&(
        <div className="card" style={{marginBottom:10}}>
          <div style={{padding:"8px 14px",background:"var(--sur2)",borderBottom:"1px solid var(--bdr)",fontSize:11,fontWeight:"bold",color:"var(--tx2)",letterSpacing:.5,textTransform:"uppercase"}}>Eigene Einträge ({custom.length})</div>
          {custom.map(([id,item],i)=>(
            <div key={id} style={{display:"flex",alignItems:"center",padding:"10px 14px",gap:10,borderBottom:i<custom.length-1?"1px solid var(--bdr2)":"none"}}>
              <div style={{width:4,height:32,borderRadius:2,background:"var(--ac)",flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,color:"var(--tx)"}}>{item.name}</div>
                {(item.amount||item.qty)&&<div style={{fontSize:11,color:"var(--tx3)"}}>{item.qty?`${item.qty}${item.unit||""}`:item.amount}</div>}
              </div>
              <button className="btn" onPointerDown={e=>{e.stopPropagation();onRemove(id);}} style={{fontSize:22,color:"var(--tx3)",background:"none",padding:"0 6px",lineHeight:1}}>×</button>
            </div>
          ))}
        </div>
      )}

      {/* Vorrätig */}
      {stocked.length>0&&(
        <div className="card" style={{marginBottom:10}}>
          <div style={{padding:"8px 14px",background:"var(--acbg)",borderBottom:"1px solid var(--bdr)",fontSize:11,fontWeight:"bold",color:"var(--ac)",letterSpacing:.5,textTransform:"uppercase"}}>✅ Vorrätig ({stocked.length})</div>
          {stocked.map((item,i)=><div key={item.id} style={{borderBottom:i<stocked.length-1?"1px solid var(--bdr2)":"none"}}><ItemRow item={item}/></div>)}
        </div>
      )}

      {/* Nicht vorrätig */}
      {notStocked.length>0&&(
        <div className="card">
          <div style={{padding:"8px 14px",background:"var(--sur2)",borderBottom:"1px solid var(--bdr)",fontSize:11,fontWeight:"bold",color:"var(--tx2)",letterSpacing:.5,textTransform:"uppercase"}}>Nicht vorrätig ({notStocked.length})</div>
          {notStocked.map((item,i)=><div key={item.id} style={{borderBottom:i<notStocked.length-1?"1px solid var(--bdr2)":"none"}}><ItemRow item={item}/></div>)}
        </div>
      )}
      {allItems.length===0&&q&&<div style={{textAlign:"center",padding:"40px 20px",color:"var(--tx3)"}}>Keine Zutaten gefunden.</div>}
    </div>
  );
}

// ── ADD RECIPE MODAL ──────────────────────────────────────────────────────
function AddRecipeModal({onSave,onClose}){
  const[name,setName]=useState("");const[emoji,setEmoji]=useState("🍽️");
  const[time,setTime]=useState("25–35 Min");const[diff,setDiff]=useState("Einfach");
  const[kcal,setKcal]=useState("");const[ptype,setPtype]=useState("vegetarian");
  const[ings,setIngs]=useState([{n:"",a:"",s:"produce"}]);const[step,setStep]=useState(0);
  const addIng=()=>setIngs(p=>[...p,{n:"",a:"",s:"produce"}]);
  const updIng=(i,f,v)=>setIngs(p=>{const c=[...p];c[i]={...c[i],[f]:v};return c;});
  const remIng=(i)=>setIngs(p=>p.filter((_,j)=>j!==i));
  const AISLES_OPT=[["produce","🥬 Gemüse"],["dairy","🧀 Milch"],["meat","🥩 Fleisch"],["dry","🥫 Trocken"],["bread","🍞 Brot"],["spices","🧄 Gewürze"],["oils","🫙 Öle"],["other","🛒 Sonstiges"]];
  const EMOJIS=["🍝","🍗","🥩","🐟","🥗","🍲","🌮","🌯","🍔","🥘","🍜","🫕","🥙","🍱","🥣","🧆"];
  const handleSave=()=>{
    if(!name.trim()) return;
    const key="custom_"+Date.now();
    const color=PROTEINS[ptype]?.color||"#4a7c59";
    const ingMap={};
    ings.filter(i=>i.n.trim()).forEach((i,idx)=>{const id=`${key}_${idx+1}`;ingMap[id]={name:i.n.trim(),amount:i.a.trim()||"nach Bedarf",aisle:i.s};});
    onSave({key,order:9999,emoji,color,name:name.trim(),description:"",time,difficulty:diff,kcal:kcal?parseInt(kcal):null,pantryItems:[],ingredients:ingMap,instructions:[]});
    onClose();
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet sup" style={{maxHeight:"88vh"}} onClick={e=>e.stopPropagation()}>
        <div style={{padding:"16px 18px 10px",borderBottom:"1px solid var(--bdr)",display:"flex",alignItems:"center",gap:8}}>
          <h2 style={{fontWeight:"normal",fontSize:17,color:"var(--tx)",flex:1}}>➕ Eigenes Rezept</h2>
          <button className="btn" onClick={onClose} style={{fontSize:22,color:"var(--tx3)",background:"none"}}>✕</button>
        </div>
        <div style={{padding:"12px 18px 8px",borderBottom:"1px solid var(--bdr)",display:"flex",gap:8}}>
          {["Basis","Zutaten"].map((l,i)=>(
            <button key={i} className="btn" onClick={()=>setStep(i)} style={{flex:1,padding:"8px",borderRadius:10,fontSize:13,background:step===i?"var(--ac)":"var(--sur2)",color:step===i?"#fff":"var(--tx2)",border:`1px solid ${step===i?"var(--ac)":"var(--bdr)"}`}}>{l}</button>
          ))}
        </div>
        <div style={{padding:"14px 18px",overflowY:"auto",maxHeight:"55vh"}}>
          {step===0&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div className="fbar" style={{gap:6,paddingBottom:8}}>
                {EMOJIS.map(e=><button key={e} className="btn" onClick={()=>setEmoji(e)} style={{fontSize:20,background:emoji===e?"var(--acbg)":"none",border:`1px solid ${emoji===e?"var(--ac)":"transparent"}`,borderRadius:8,padding:"4px 6px"}}>{e}</button>)}
              </div>
              <input placeholder="Rezeptname *" value={name} onChange={e=>setName(e.target.value)} style={{padding:"10px 14px",fontSize:14,borderRadius:10,width:"100%"}}/>
              <div style={{display:"flex",gap:8}}>
                <select value={time} onChange={e=>setTime(e.target.value)} style={{flex:1,padding:"10px 10px",fontSize:13,borderRadius:10}}>
                  {["10–20 Min","15–25 Min","20–30 Min","25–35 Min","30–40 Min","35–45 Min"].map(t=><option key={t}>{t}</option>)}
                </select>
                <select value={diff} onChange={e=>setDiff(e.target.value)} style={{flex:1,padding:"10px 10px",fontSize:13,borderRadius:10}}>
                  <option>Einfach</option><option>Mittel</option>
                </select>
              </div>
              <div style={{display:"flex",gap:8}}>
                <input placeholder="kcal (optional)" type="number" value={kcal} onChange={e=>setKcal(e.target.value)} style={{flex:1,padding:"10px 10px",fontSize:13,borderRadius:10}}/>
                <select value={ptype} onChange={e=>setPtype(e.target.value)} style={{flex:1,padding:"10px 10px",fontSize:13,borderRadius:10}}>
                  {Object.entries(PROTEINS).map(([k,p])=><option key={k} value={k}>{p.emoji} {p.label}</option>)}
                </select>
              </div>
            </div>
          )}
          {step===1&&(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{fontSize:12,color:"var(--tx3)",marginBottom:2}}>Zutaten:</div>
              {ings.map((ing,i)=>(
                <div key={i} style={{display:"flex",gap:5,alignItems:"center"}}>
                  <input placeholder="Zutat" value={ing.n} onChange={e=>updIng(i,"n",e.target.value)} style={{flex:2,padding:"8px 10px",fontSize:13,borderRadius:8,minWidth:0}}/>
                  <input placeholder="300g" value={ing.a} onChange={e=>updIng(i,"a",e.target.value)} style={{flex:"0 0 64px",padding:"8px 6px",fontSize:13,borderRadius:8,minWidth:0}}/>
                  <select value={ing.s} onChange={e=>updIng(i,"s",e.target.value)} style={{flex:1,padding:"8px 4px",fontSize:11,borderRadius:8,minWidth:0}}>
                    {AISLES_OPT.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                  {ings.length>1&&<button className="btn" onClick={()=>remIng(i)} style={{fontSize:20,color:"var(--dan)",background:"none",padding:"0 3px",flexShrink:0}}>×</button>}
                </div>
              ))}
              <button className="btn" onClick={addIng} style={{padding:"8px",borderRadius:10,background:"var(--sur2)",border:"1px solid var(--bdr)",color:"var(--tx2)",fontSize:13}}>+ Zutat hinzufügen</button>
            </div>
          )}
        </div>
        <div style={{padding:"10px 18px 14px",borderTop:"1px solid var(--bdr)",display:"flex",gap:8}}>
          <button className="btn" onClick={onClose} style={{flex:1,padding:12,borderRadius:12,border:"1px solid var(--bdr)",background:"var(--sur)",color:"var(--tx2)",fontSize:14}}>Abbrechen</button>
          <button className="btn" onClick={handleSave} style={{flex:1,padding:12,borderRadius:12,background:name.trim()?"var(--ac)":"#aaa",color:"#fff",fontSize:14,fontWeight:"bold"}}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ── THIS WEEK MODAL (v2: tabs for Übersicht + Nährwerte) ──────────────────
function ThisWeekModal({recipes,sels,ingState,weekId,onServChange,onToggleSel,onClearAll,onClose,onOpenRecipe}){
  const[tab,setTab]=useState("overview");
  const selRecipes=recipes.filter(r=>getSel(sels,r.key).selected);
  // Price total
  const priceTotal=selRecipes.reduce((sum,r)=>{const{total}=estimateRecipePrice(r);return sum+total;},0);
  // Nutrition
  const totalKcal=selRecipes.reduce((s,r)=>s+(r.kcal||0)*(getSel(sels,r.key).servings||2)/2,0);
  const avgKcalDay=Math.round(totalKcal/7);
  const maxKcal=totalKcal>3500?"high":totalKcal>2000?"ok":"low";
  const barColor=maxKcal==="high"?"#c07830":maxKcal==="ok"?"#4a7c59":"#7a9aa0";
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet sup" onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div style={{padding:"18px 20px 0",borderBottom:"1px solid var(--bdr)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{flex:1}}>
              <h2 style={{fontWeight:"normal",fontSize:18,color:"var(--tx)"}}>📅 Diese Woche</h2>
              <div style={{fontSize:11,color:"var(--tx3)",marginTop:2}}>{weekLabel(weekId)}</div>
            </div>
            {selRecipes.length>0&&<button className="btn" onClick={onClearAll} style={{fontSize:12,color:"var(--dan)",background:"none",padding:"4px 8px",border:"1px solid var(--dan)",borderRadius:8}}>Alle abwählen</button>}
            <button className="btn" onClick={onClose} style={{fontSize:22,color:"var(--tx3)",background:"none"}}>✕</button>
          </div>
          {/* Tabs */}
          <div style={{display:"flex",gap:0,background:"var(--sur2)",borderRadius:10,padding:3}}>
            {[["overview","📋 Übersicht"],["nutrition","🥗 Nährwerte"]].map(([t,l])=>(
              <button key={t} className="btn" onClick={()=>setTab(t)} style={{flex:1,padding:"7px 8px",borderRadius:8,fontSize:13,background:tab===t?"var(--sur)":"transparent",color:tab===t?"var(--tx)":"var(--tx2)",fontWeight:tab===t?"bold":"normal",boxShadow:tab===t?"0 1px 4px rgba(0,0,0,.08)":"none"}}>{l}</button>
            ))}
          </div>
        </div>

        {tab==="overview"&&(
          <div style={{paddingBottom:8}}>
            {selRecipes.length===0?(
              <div style={{textAlign:"center",padding:"40px 20px",color:"var(--tx3)"}}>
                <div style={{fontSize:36,marginBottom:10}}>📋</div>
                <div style={{fontSize:14}}>Noch keine Rezepte ausgewählt.</div>
              </div>
            ):(
              <>
                {selRecipes.map(recipe=>{
                  const sel=getSel(sels,recipe.key);
                  return(
                    <div key={recipe.key} style={{display:"flex",alignItems:"center",padding:"12px 20px",gap:12,borderBottom:"1px solid var(--bdr2)"}}>
                      <div style={{cursor:"pointer",display:"flex",alignItems:"center",gap:10,flex:1,minWidth:0}} onClick={()=>{onOpenRecipe(recipe);onClose();}}>
                        {recipe.photo?<img src={recipe.photo} alt="" style={{width:46,height:46,borderRadius:8,objectFit:"cover",flexShrink:0}}/>:<span style={{fontSize:26,flexShrink:0}}>{recipe.emoji}</span>}
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:14,color:"var(--ac)",fontWeight:"bold",lineHeight:1.3}}>{recipe.name}</div>
                          <div style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>
                            {FLAGS.prepCookSplit&&recipe.prepMins?`✋ ${recipe.prepMins} · 🔥 ${recipe.cookMins} Min`:`⏱ ${recipe.time}`}
                            {recipe.kcal?` · 🔥 ${recipe.kcal} kcal`:""}
                          </div>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                        <button className="btn" onClick={()=>onServChange(recipe.key,Math.max(1,sel.servings-1))} style={{width:26,height:26,borderRadius:"50%",background:"var(--sur2)",border:"1px solid var(--bdr)",fontSize:16,color:"var(--tx)",display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                        <span style={{fontSize:14,fontWeight:"bold",minWidth:20,textAlign:"center",color:"var(--tx)"}}>{sel.servings}</span>
                        <button className="btn" onClick={()=>onServChange(recipe.key,Math.min(10,sel.servings+1))} style={{width:26,height:26,borderRadius:"50%",background:"var(--sur2)",border:"1px solid var(--bdr)",fontSize:16,color:"var(--tx)",display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                        <span style={{fontSize:10,color:"var(--tx3)",marginRight:2}}>P</span>
                        <button className="btn" onClick={()=>onToggleSel(recipe.key)} style={{fontSize:18,color:"var(--dan)",background:"none",padding:"0 3px"}}>✕</button>
                      </div>
                    </div>
                  );
                })}
                {FLAGS.priceEstimates&&<div style={{padding:"12px 20px",borderTop:"1px solid var(--bdr)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,color:"var(--tx2)"}}>💰 Geschätzte Kosten</span>
                  <span style={{fontSize:15,fontWeight:"bold",color:"var(--ac)"}}>~€{priceTotal.toFixed(2)}*</span>
                </div>}
              </>
            )}
          </div>
        )}

        {tab==="nutrition"&&(
          <div style={{padding:"16px 20px"}}>
            {selRecipes.length===0?(
              <div style={{textAlign:"center",padding:"30px 0",color:"var(--tx3)"}}>Keine Rezepte ausgewählt.</div>
            ):(
              <>
                <div style={{display:"flex",gap:12,marginBottom:16}}>
                  {[["🔥 Total kcal",Math.round(totalKcal)+" kcal"],["📅 kcal/Tag",avgKcalDay+" kcal"],["🥩 Protein","~"+Math.round(selRecipes.reduce((s,r)=>s+(r.kcal||0)*0.05,0))+"g"]].map(([l,v])=>(
                    <div key={l} style={{flex:1,padding:"10px 8px",background:"var(--sur2)",borderRadius:10,textAlign:"center"}}>
                      <div style={{fontSize:10,color:"var(--tx3)",marginBottom:4}}>{l}</div>
                      <div style={{fontSize:15,fontWeight:"bold",color:"var(--tx)"}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--tx3)",marginBottom:4}}>
                    <span>Wochenenergie</span>
                    <span style={{color:barColor}}>{maxKcal==="high"?"🟠 Kalorienreich":maxKcal==="ok"?"🟢 Ausgewogen":"🔵 Leicht"}</span>
                  </div>
                  <div className="nutr-bar-bg">
                    <div className="nutr-bar-fg" style={{width:`${Math.min((totalKcal/5000)*100,100)}%`,background:barColor}}/>
                  </div>
                </div>
                <div style={{fontSize:12,color:"var(--tx3)",marginBottom:8}}>Aufschlüsselung nach Rezept:</div>
                {selRecipes.filter(r=>r.kcal).map(r=>{
                  const recKcal=(r.kcal||0)*(getSel(sels,r.key).servings||2)/2;
                  const pct=totalKcal>0?Math.round((recKcal/totalKcal)*100):0;
                  return<div key={r.key} style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:2}}>
                      <span style={{color:"var(--tx)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,marginRight:8}}>{r.emoji} {r.name}</span>
                      <span style={{color:"var(--tx2)",flexShrink:0}}>{recKcal} kcal ({pct}%)</span>
                    </div>
                    <div className="nutr-bar-bg" style={{height:6}}>
                      <div className="nutr-bar-fg" style={{width:`${pct}%`,background:r.color,height:6}}/>
                    </div>
                  </div>;
                })}
                <div style={{fontSize:10,color:"var(--tx3)",marginTop:12}}>* Schätzwerte basierend auf 2 Portionen pro Rezept. Proteinschätzung ~5% der kcal.</div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── SETTINGS / HISTORY MODAL ──────────────────────────────────────────────
function HistoryModal({history,onClose}){
  const entries=Object.entries(history||{}).sort((a,b)=>b[0].localeCompare(a[0]));
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet sup" onClick={e=>e.stopPropagation()}>
        <div style={{padding:"20px",borderBottom:"1px solid var(--bdr)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <h2 style={{fontWeight:"normal",fontSize:18,color:"var(--tx)"}}>📚 Wochenhistorie</h2>
          <button className="btn" onClick={onClose} style={{fontSize:22,color:"var(--tx3)",background:"none"}}>✕</button>
        </div>
        {entries.length===0?<div style={{textAlign:"center",padding:"40px 20px",color:"var(--tx3)",fontSize:14}}>Noch keine Historie.</div>:
          entries.map(([key,snap])=>{
            const label=weekLabel(key)||new Date(parseInt(key)).toLocaleDateString("de-DE",{day:"numeric",month:"short",year:"numeric"});
            const meta=snap?.meta||{};
            const sels=snap?.selections||{};
            const state=snap?.state||{};
            const selKeys=Object.keys(sels).filter(k=>sels[k]?.selected);
            const vals=Object.values(state);
            const done=vals.filter(s=>s?.status==="full").length;
            return<div key={key} className="hist-row">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{fontSize:14,fontWeight:"bold",color:"var(--tx)"}}>{meta.label||label}</div>
                <span style={{fontSize:11,color:"var(--tx3)"}}>{done}/{vals.length} ✅</span>
              </div>
              {selKeys.length>0&&<div style={{fontSize:11,color:"var(--tx3)",marginTop:3}}>{selKeys.length} Rezept{selKeys.length>1?"e":""} geplant</div>}
            </div>;
          })
        }
      </div>
    </div>
  );
}
