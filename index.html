// ── CLAUDE CONTEXT MODAL ──────────────────────────────────────────────────
function ClaudeModal({recipes,ingState,sels,onClose}){
  const[copied,setCopied]=useState(false);
  const selRecipes=recipes.filter(r=>getSel(sels,r.key).selected);
  const missing=[];
  selRecipes.forEach(r=>{r.ingredients.forEach(ing=>{const s=ingState[ing.id]||{};if(s.status!=="full")missing.push(`- ${ing.name} (${needAmt(ing,r.key,sels)}) [${r.name}]`);});});
  const ctx=`Hallo! Ich nutze unsere Meal-Prep App für diese Woche.\n\nAusgewählte Rezepte:\n${selRecipes.map(r=>`- ${r.name} (${getSel(sels,r.key).servings}P)`).join("\n")}\n\nFehlende Zutaten:\n${missing.join("\n")}\n\nWas möchtest du ändern oder wissen?`;
  const copy=async()=>{await navigator.clipboard.writeText(ctx);setCopied(true);setTimeout(()=>setCopied(false),2500);};
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet sup" onClick={e=>e.stopPropagation()}>
        <div style={{padding:"20px 20px 14px",borderBottom:"1px solid var(--bdr)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <h2 style={{fontWeight:"normal",fontSize:18,color:"var(--tx)"}}>🤖 Claude öffnen</h2>
          <button className="btn" onClick={onClose} style={{fontSize:22,color:"var(--tx3)",background:"none"}}>✕</button>
        </div>
        <div style={{padding:"16px 20px"}}>
          <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.6,marginBottom:14}}>Kontext kopieren und in Claude einfügen um Rezepte zu aktualisieren oder Zutaten anzupassen.</p>
          <div style={{background:"var(--sur2)",borderRadius:10,padding:"12px 14px",fontSize:12,color:"var(--tx2)",lineHeight:1.6,whiteSpace:"pre-wrap",marginBottom:14,maxHeight:200,overflow:"auto",border:"1px solid var(--bdr)"}}>{ctx}</div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn" onClick={copy} style={{flex:1,padding:13,borderRadius:12,background:copied?"var(--ac)":"var(--sur2)",border:`1px solid ${copied?"var(--ac)":"var(--bdr)"}`,color:copied?"#fff":"var(--tx)",fontSize:14}}>{copied?"✅ Kopiert!":"📋 Kontext kopieren"}</button>
            <button className="btn" onClick={()=>window.open("https://claude.ai","_blank")} style={{flex:1,padding:13,borderRadius:12,background:"var(--hd)",color:"#fff",fontSize:14,fontWeight:"bold"}}>Claude öffnen →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── APP (useReducer) ──────────────────────────────────────────────────────
function App(){
  const[state,dispatch]=useReducer(appReducer,initialState);
  const lw=useRef(false);// local-write guard

  // ── Dark mode effect ──
  useEffect(()=>{
    const apply=m=>{
      const sys=window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme",(m==="dark"||(m==="auto"&&sys))?"dark":"light");
    };
    apply(state.darkMode);
    const mq=window.matchMedia("(prefers-color-scheme: dark)");
    const h=()=>apply(state.darkMode);mq.addEventListener("change",h);
    return()=>mq.removeEventListener("change",h);
  },[state.darkMode]);

  const setDarkMode=m=>{dispatch({type:"SET_DARK_MODE",v:m});FB.set(`${FB.settings()}/darkMode`,m);};

  // ── Android back button ──
  useEffect(()=>{
    window.history.replaceState({app:"base"},"");
    window.history.pushState({app:"modal"},"");
    const handle=()=>{
      const{selRecipe,showReset,showSettings,showThisWeek,showClaude,showAddRecipe}=state;
      if(selRecipe) dispatch({type:"CLOSE_RECIPE"});
      else if(showReset) dispatch({type:"HIDE_MODAL",modal:"showReset"});
      else if(showSettings) dispatch({type:"HIDE_MODAL",modal:"showSettings"});
      else if(showThisWeek) dispatch({type:"HIDE_MODAL",modal:"showThisWeek"});
      else if(showClaude) dispatch({type:"HIDE_MODAL",modal:"showClaude"});
      else if(showAddRecipe) dispatch({type:"HIDE_MODAL",modal:"showAddRecipe"});
      window.history.pushState({app:"modal"},"");
    };
    window.addEventListener("popstate",handle);
    return()=>window.removeEventListener("popstate",handle);
  },[state.selRecipe,state.showReset,state.showSettings,state.showThisWeek,state.showClaude,state.showAddRecipe]);

  // ── iOS PWA prompt ──
  useEffect(()=>{
    if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone)
      dispatch({type:"SHOW_MODAL",modal:"showPWA"});
  },[]);

  // ── Firebase init, migration, subscribe ──
  useEffect(()=>{
    const{weekId:wid}=state;
    (async()=>{
      await runMigration();
      // Seed recipes if empty
      const snap=await FB.getOnce(FB.recipes());
      if(!snap){
        const fb={};
        SEED.forEach(r=>{
          const ings={};r.ingredients.forEach(i=>{ings[i.id]={name:i.name,amount:i.amount,aisle:i.aisle};});
          fb[r.key]={name:r.name,emoji:r.emoji,color:r.color,kcal:r.kcal||null,prepMins:r.prepMins||null,cookMins:r.cookMins||null,description:r.description,time:r.time,difficulty:r.difficulty,order:r.order,pantryItems:r.pantryItems,instructions:r.instructions,ingredients:ings};
        });
        await FB.set(FB.recipes(),fb);
        await FB.set(FB.weekState(wid),buildInit(SEED));
        await FB.set(FB.weekSel(wid),buildDefSel(SEED));
      } else {
        // Patch existing recipes missing prepMins/cookMins from SEED data
        const patches=[];
        SEED.forEach(s=>{
          const fb=snap[s.key];
          if(fb&&(fb.prepMins==null||fb.cookMins==null)){
            patches.push(FB.update(`${FB.recipes()}/${s.key}`,{prepMins:s.prepMins,cookMins:s.cookMins}));
          }
        });
        if(patches.length) await Promise.all(patches);
      }
    })();

    const unsubs=[];
    const sub=(path,cb)=>{const u=FB.sub(path,cb,e=>{console.error(e);dispatch({type:"SET_SYNC",v:"error"});});unsubs.push(u);};

    sub(FB.recipes(),d=>{
      dispatch({type:"SET_SYNC",v:"synced"});
      dispatch({type:"SET_LOADING",v:false});
      if(d) dispatch({type:"SET_RECIPES",v:fromFB(d)});
    });
    sub(FB.weekState(wid),d=>{if(!lw.current&&d) dispatch({type:"SET_ING_STATE",v:d});else if(!d) dispatch({type:"SET_ING_STATE",v:buildInit(SEED)});});
    sub(FB.weekSel(wid),d=>{if(d) dispatch({type:"SET_SELS",v:d});else dispatch({type:"SET_SELS",v:buildDefSel(SEED)});});
    sub(FB.favs(),d=>{dispatch({type:"SET_PROFILE",v:{favourites:d||{}}});});
    sub(`${FB.profile()}/ratings`,d=>{dispatch({type:"SET_PROFILE",v:{ratings:d||{}}});});
    sub(`${FB.profile()}/notes`,d=>{dispatch({type:"SET_PROFILE",v:{notes:d||{}}});});
    sub(`${FB.profile()}/lastCooked`,d=>{dispatch({type:"SET_PROFILE",v:{lastCooked:d||{}}});});
    sub(FB.pantryCustom(),d=>{dispatch({type:"SET_CUSTOM_PANTRY",v:d||{}});});
    sub(FB.pantryInv(),d=>{dispatch({type:"SET_PANTRY_INV",v:d||{}});});
    sub(FB.history(),d=>{dispatch({type:"SET_HISTORY",v:d||{}});});
    sub(FB.settings(),d=>{if(d?.darkMode) dispatch({type:"SET_DARK_MODE",v:d.darkMode});});
    return()=>unsubs.forEach(u=>u());
  },[state.weekId]);

  // ── Update handlers ──
  const updateIng=useCallback((id,field,value)=>{
    lw.current=true;
    dispatch({type:"PATCH_ING",id,patch:{[field]:value}});
    FB.update(`${FB.weekState(state.weekId)}/${id}`,{[field]:value}).then(()=>setTimeout(()=>lw.current=false,400));
  },[state.weekId]);
  const setIngStatus=useCallback((id,status)=>{
    lw.current=true;
    dispatch({type:"PATCH_ING",id,patch:{status}});
    FB.update(`${FB.weekState(state.weekId)}/${id}`,{status}).then(()=>setTimeout(()=>lw.current=false,400));
  },[state.weekId]);
  const saveIngName=useCallback((rk,id,name)=>{
    FB.update(`${FB.recipes()}/${rk}/ingredients/${id}`,{name});
  },[]);
  const toggleSel=useCallback((key)=>{
    const cur=getSel(state.sels,key);
    const next={...cur,selected:!cur.selected};
    dispatch({type:"PATCH_SEL",key,patch:{selected:next.selected}});
    FB.set(`${FB.weekSel(state.weekId)}/${key}`,next);
  },[state.sels,state.weekId]);
  const changeServings=useCallback((key,srv)=>{
    const cur=getSel(state.sels,key);
    const next={...cur,servings:srv};
    dispatch({type:"PATCH_SEL",key,patch:{servings:srv}});
    FB.set(`${FB.weekSel(state.weekId)}/${key}`,next);
  },[state.sels,state.weekId]);
  const toggleFav=useCallback((key)=>{
    const next=!state.profile.favourites?.[key];
    dispatch({type:"SET_FAV",key,v:next});
    FB.set(`${FB.favs()}/${key}`,next||null);
    if(next) showToast("⭐ Favorit gespeichert");
  },[state.profile.favourites]);
  const setRating=useCallback((key,v)=>{
    dispatch({type:"SET_RATING",key,v});
    FB.set(`${FB.profile()}/ratings/${key}`,v);
  },[]);
  const setNote=useCallback((key,v)=>{
    dispatch({type:"SET_NOTE",key,v});
    FB.set(`${FB.profile()}/notes/${key}`,v);
  },[]);

  // ── Reset / archive ──
  const handleReset=()=>{
    const{weekId:wid,ingState}=state;
    haptic([10,50,10]);
    // Archive current week
    const archiveSnap={meta:{label:weekLabel(wid)},selections:state.sels,state:ingState};
    FB.set(`${FB.history()}/${wid}`,archiveSnap);
    // Mark as cooked — save lastCooked for selected recipes
    const selKeys=Object.keys(state.sels).filter(k=>state.sels[k]?.selected);
    selKeys.forEach(k=>FB.set(`${FB.profile()}/lastCooked/${k}`,wid));
    // Fresh state
    const fresh={};Object.keys(ingState).forEach(id=>{fresh[id]={...ingState[id],status:"none",have:""};});
    lw.current=true;
    FB.set(FB.weekState(wid),fresh).then(()=>setTimeout(()=>lw.current=false,500));
    dispatch({type:"SET_ING_STATE",v:fresh});
    dispatch({type:"HIDE_MODAL",modal:"showReset"});
    showToast(`✓ Zurückgesetzt — ${weekShort(wid)} archiviert`);
  };

  // ── Week navigation ──
  const navigateWeek=async(dir)=>{
    const newOffset=state.weekOffset+dir;
    const newWid=weekId(newOffset);
    // check if current week has any selections
    const selKeys=Object.keys(state.sels).filter(k=>state.sels[k]?.selected);
    if(dir>0&&selKeys.length>0){
      // archive current before advancing
      const archiveSnap={meta:{label:weekLabel(state.weekId)},selections:state.sels,state:state.ingState};
      await FB.set(`${FB.history()}/${state.weekId}`,archiveSnap);
    }
    dispatch({type:"SET_WEEK",offset:newOffset});
  };

  // ── Share ──
  const handleShare=async()=>{
    let text="🛒 Einkaufsliste\n\n";
    const selRecs=state.recipes.filter(r=>getSel(state.sels,r.key).selected);
    const groups={};
    selRecs.forEach(r=>r.ingredients.forEach(ing=>{
      if(state.ingState[ing.id]?.status==="full") return;
      const a=ing.aisle||"other";
      if(!groups[a]) groups[a]=[];
      groups[a].push(`${normShop(ing.name)} – ${needAmt(ing,r.key,state.sels)}`);
    }));
    Object.entries(groups).sort((a,b)=>(AISLES[a[0]]?.order||99)-(AISLES[b[0]]?.order||99))
      .forEach(([a,items])=>{text+=`${AISLES[a]?.label||"Sonstiges"}\n${items.map(i=>`• ${i}`).join("\n")}\n\n`;});
    try{if(navigator.share)await navigator.share({title:"Einkaufsliste",text});else{await navigator.clipboard.writeText(text);showToast("📋 In Zwischenablage kopiert!");}}catch(e){}
  };

  const handleAddRecipe=async(recipe)=>{
    await FB.set(`${FB.recipes()}/${recipe.key}`,recipe);
    const ingIds=Object.keys(recipe.ingredients||{});
    for(const id of ingIds) await FB.set(`${FB.weekState(state.weekId)}/${id}`,{have:"",status:"none",note:""});
    await FB.set(`${FB.weekSel(state.weekId)}/${recipe.key}`,{selected:false,servings:2});
  };

  const{recipes,ingState,sels,profile,customPantry,pantryInventory,history,darkMode,loading,sync,weekId:wid,weekOffset}=state;

  const selIngAll=useMemo(()=>recipes.filter(r=>getSel(sels,r.key).selected).flatMap(r=>r.ingredients),[recipes,sels]);
  const fullCount=selIngAll.filter(i=>ingState[i.id]?.status==="full").length;
  const missingCount=selIngAll.filter(i=>ingState[i.id]?.status!=="full").length;
  const total=selIngAll.length;
  const sc={connecting:"#f0a500",synced:"#4a7c59",syncing:"#f0a500",error:"#c0392b"}[sync]||"#f0a500";
  const st={connecting:"Verbinde…",synced:"Synchronisiert ✓",syncing:"Speichert…",error:"Fehler"}[sync];

  const TABS=[
    {id:"recipes",icon:"📖",label:"Rezepte"},
    {id:"checklist",icon:"📋",label:"Checkliste"},
    {id:"shopping",icon:"🛒",label:`Einkauf${missingCount>0?` (${missingCount})`:""}` },
    {id:"pantry",icon:"🥦",label:"Vorrat"},
  ];

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <ToastManager/>
      {/* Modals */}
      {state.selRecipe&&<RecipeModal recipe={state.selRecipe} ingState={ingState} sels={sels} profile={profile}
        onClose={()=>dispatch({type:"CLOSE_RECIPE"})} onServChange={changeServings}
        onSetRating={setRating} onSetNote={setNote}/>}
      {state.showAddRecipe&&<AddRecipeModal onSave={handleAddRecipe} onClose={()=>dispatch({type:"HIDE_MODAL",modal:"showAddRecipe"})}/>}
      {state.showThisWeek&&<ThisWeekModal recipes={recipes} sels={sels} ingState={ingState} weekId={wid}
        onServChange={changeServings} onToggleSel={toggleSel}
        onClearAll={()=>{recipes.forEach(r=>{if(getSel(sels,r.key).selected)toggleSel(r.key);});dispatch({type:"HIDE_MODAL",modal:"showThisWeek"});}}
        onClose={()=>dispatch({type:"HIDE_MODAL",modal:"showThisWeek"})}
        onOpenRecipe={r=>{dispatch({type:"OPEN_RECIPE",recipe:r});dispatch({type:"HIDE_MODAL",modal:"showThisWeek"});}}/>}
      {state.showReset&&<ConfirmModal emoji="🔄" title="Alle Status zurücksetzen?" confirmLabel="Zurücksetzen & Archivieren"
        body={`Setzt alles auf ❌ und archiviert ${weekShort(wid)}.`}
        extra={Object.keys(history).length>0&&<div style={{marginTop:8,fontSize:12,color:"var(--tx3)"}}>📚 {Object.keys(history).length} Woche(n) archiviert</div>}
        onConfirm={handleReset} onCancel={()=>dispatch({type:"HIDE_MODAL",modal:"showReset"})}/>}
      {state.showSettings&&<SettingsModal darkMode={darkMode} onDarkMode={setDarkMode} history={history} onClose={()=>dispatch({type:"HIDE_MODAL",modal:"showSettings"})}/>}
      {state.showClaude&&<ClaudeModal recipes={recipes} ingState={ingState} sels={sels} onClose={()=>dispatch({type:"HIDE_MODAL",modal:"showClaude"})}/>}

      {/* Header */}
      <div style={{background:"var(--hd)",padding:"14px 16px 10px",boxShadow:"0 2px 12px rgba(0,0,0,.18)",flexShrink:0}}>
        <div style={{maxWidth:660,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            {/* Week label + nav */}
            <div>
              <h1 style={{color:"var(--ht)",margin:0,fontSize:16,fontWeight:"normal"}}>🛒 Wocheneinkauf</h1>
              {FLAGS.weekNav&&<div style={{display:"flex",alignItems:"center",gap:4,marginTop:2}}>
                <button className="btn" onClick={()=>navigateWeek(-1)} style={{fontSize:13,color:"var(--hs)",background:"none",padding:"0 3px",lineHeight:1}}>‹</button>
                <span style={{fontSize:11,color:"var(--hs)"}}>{weekShort(wid)}</span>
                <button className="btn" onClick={()=>navigateWeek(1)} style={{fontSize:13,color:"var(--hs)",background:"none",padding:"0 3px",lineHeight:1}}>›</button>
                <span style={{width:6,height:6,borderRadius:"50%",background:sc,display:"inline-block",marginLeft:4}} className={(sync==="connecting"||sync==="syncing")?"pls":""}/>
              </div>}
              {!FLAGS.weekNav&&<div style={{display:"flex",alignItems:"center",gap:5,marginTop:3}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:sc,display:"inline-block"}} className={(sync==="connecting"||sync==="syncing")?"pls":""}/>
                <span style={{color:"var(--hs)",fontSize:11}}>{st}</span>
              </div>}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button className="btn" onClick={()=>dispatch({type:"SHOW_MODAL",modal:"showThisWeek"})} style={{fontSize:18,color:"var(--hs)",background:"none",padding:"2px 6px"}} title="Diese Woche">📅</button>
              {state.view==="checklist"&&<button className="btn" onClick={()=>dispatch({type:"SHOW_MODAL",modal:"showReset"})} style={{fontSize:18,color:"var(--hs)",background:"none",padding:"2px 6px"}} title="Reset">🔄</button>}
              <button className="btn" onClick={()=>dispatch({type:"SHOW_MODAL",modal:"showAddRecipe"})} style={{fontSize:18,color:"var(--hs)",background:"none",padding:"2px 6px"}} title="Rezept hinzufügen">➕</button>
              <button className="btn" onClick={()=>dispatch({type:"SHOW_MODAL",modal:"showSettings"})} style={{fontSize:18,color:"var(--hs)",background:"none",padding:"2px 6px"}}>⚙️</button>
            </div>
          </div>
          {total>0&&<div style={{marginTop:6,display:"flex",gap:6,alignItems:"center"}}>
            <div className="prog" style={{flex:1}}><div className="progf" style={{width:`${(fullCount/total)*100}%`}}/></div>
            <span style={{fontSize:11,color:"var(--hs)",flexShrink:0}}>{fullCount}/{total}</span>
          </div>}
        </div>
      </div>

      {state.showPWA&&<div style={{background:"var(--ac)",color:"#fff",padding:"10px 16px",fontSize:13,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <span style={{flex:1}}>📲 Zum Startbildschirm: Teilen → "Zum Home-Bildschirm"</span>
        <button className="btn" onClick={()=>dispatch({type:"HIDE_MODAL",modal:"showPWA"})} style={{color:"#fff",fontSize:18,background:"none"}}>✕</button>
      </div>}
      {sync==="error"&&<div style={{background:"var(--dan)",color:"#fff",padding:"8px 16px",fontSize:12,textAlign:"center",flexShrink:0}}>❌ Firebase-Fehler — Datenbankregeln prüfen</div>}

      {/* Content */}
      <div className="scroll" style={{paddingBottom:`calc(var(--nav) + var(--sab) + 32px)`}}>
        {loading?(
          FLAGS.skeletonLoading?<SkeletonCards/>:(
            <div style={{textAlign:"center",padding:"60px 20px",color:"var(--tx3)"}}>
              <div style={{fontSize:40,marginBottom:12}}>⏳</div><div>Lade Rezepte…</div>
            </div>
          )
        ):(
          <>
            {state.view==="recipes"&&<RecipesView recipes={recipes} ingState={ingState} sels={sels} profile={profile}
              currentWeekId={wid} pantryInventory={pantryInventory}
              onToggleSel={toggleSel} onToggleFav={toggleFav} onServChange={changeServings}
              onOpenRecipe={r=>dispatch({type:"OPEN_RECIPE",recipe:r})}/>}
            {state.view==="checklist"&&<ChecklistView recipes={recipes} ingState={ingState} sels={sels} updateIng={updateIng} setIngStatus={setIngStatus} saveIngName={saveIngName}/>}
            {state.view==="shopping"&&<ShoppingView recipes={recipes} ingState={ingState} sels={sels} onShare={handleShare} setIngStatus={setIngStatus} pantryInventory={pantryInventory}/>}
            {state.view==="pantry"&&<PantryView recipes={recipes} ingState={ingState} customPantry={customPantry} pantryInventory={pantryInventory} updateIng={updateIng} setIngStatus={setIngStatus}
              onAdd={(id,d)=>FB.set(`${FB.pantryCustom()}/${id}`,d)} onRemove={id=>FB.remove(`${FB.pantryCustom()}/${id}`)}
              onUpdatePantryInv={(k,v)=>v?FB.set(`${FB.pantryInv()}/${k}`,v):FB.remove(`${FB.pantryInv()}/${k}`)}/>}
          </>
        )}
      </div>

      {/* FAB */}
      {(state.view==="checklist"||state.view==="shopping")&&(
        <button className="fab bounce-in" style={{width:44,height:44,fontSize:18}} onClick={()=>dispatch({type:"SHOW_MODAL",modal:"showClaude"})} title="Claude öffnen">🤖</button>
      )}

      {/* Bottom nav */}
      <div className="bnav">
        {TABS.map(t=>(
          <button key={t.id} className={`nbt${state.view===t.id?" on":""}`} onClick={()=>dispatch({type:"SET_VIEW",view:t.id})}>
            <span className="ni">{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
